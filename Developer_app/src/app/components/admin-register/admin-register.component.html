<div>
  <div>
    <h1>רישום בעל עסק </h1>
    <input type="email" [(ngModel)]="email_to_add" placeholder="הכנס את האימייל שברצונך להוסיף" />
    <button (click)="register()">Register</button>
  </div>

  <div>
    <h1>מחיקת בעל עסק</h1>
    <input type="email" [(ngModel)]="email_to_remove" placeholder="הכנס את האימייל שברצונך להסיר" />
    <button (click)="remove()">Remove</button>
  </div>
</div>
